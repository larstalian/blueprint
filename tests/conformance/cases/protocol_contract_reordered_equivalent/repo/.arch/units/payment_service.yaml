id: payment_service
kind: service
language: python
generation_mode: managed
layer: service
files:
  - app/payments/service.py
provides:
  - payment_authorizer
consumes:
  - payment_gateway_contract
requires:
  - event_bus
  - audit_logger
patterns:
  - protocol_contract
  - constructor_injection
tests:
  - tests/unit/payments/test_service.py
  - tests/contracts/test_payment_authorizer.py
policies:
  concurrency: sync
  side_effects:
    filesystem: false
    network: true
